schema_version: "workflow-contract-v1"
name: "handle-security-issue"
description: "Step-by-step guide to addressing security vulnerabilities and concerns."
version: "1.0.0"
entry_mode: "human"
execution_profile: "core"
inputs: []
stages:
  - id: "inline"
    asset: "stages/01-inline.md"
    kind: "analysis"
    produces: ["stage:inline"]
    consumes: []
    mutation_scope: []
artifacts: []
done_gate:
