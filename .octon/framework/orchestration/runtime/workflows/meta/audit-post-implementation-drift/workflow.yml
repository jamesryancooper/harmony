---
schema_version: workflow-contract-v2
name: audit-post-implementation-drift
description: Audit an implemented proposal for proposal-path backreferences, naming drift, projection drift, target-family mixing, and excess churn.
version: 1.0.0
entry_mode: human
execution_profile: core
side_effect_class: read_only
execution_controls:
  cancel_safe: true
coordination_key_strategy:
  kind: workflow-target
  source_fields:
    - workflow_group
    - workflow_id
  format: workflow:{workflow_group}/{workflow_id}
executor_interface_version: workflow-executor-v1
inputs:
  - name: proposal_path
    type: folder
    required: true
    description: Root proposal directory to audit after implementation conformance
stages:
  - id: audit-post-implementation-drift
    asset: stages/01-audit-post-implementation-drift.md
    kind: verification
    consumes: []
    produces:
      - stage:audit-post-implementation-drift
    mutation_scope: []
    authorization:
      action_type: execute_stage
      requested_capabilities:
        - workflow.stage.execute
        - evidence.write
      side_effects:
        write_repo: false
        write_evidence: true
        shell: true
        network: false
        model_invoke: false
        state_mutation: false
        publication: false
        branch_mutation: false
      risk_tier: low
      scope:
        read:
          - workflow-scope
        write:
          - workflow-evidence
      review_requirements:
        human_approval: false
        quorum: false
        rollback_metadata: false
      allowed_executor_profiles:
        - read_only_analysis
  - id: report
    asset: stages/02-report.md
    kind: projection
    consumes:
      - stage:audit-post-implementation-drift
    produces:
      - stage:report
    mutation_scope: []
    authorization:
      action_type: execute_stage
      requested_capabilities:
        - workflow.stage.execute
        - evidence.write
      side_effects:
        write_repo: false
        write_evidence: true
        shell: true
        network: false
        model_invoke: false
        state_mutation: false
        publication: false
        branch_mutation: false
      risk_tier: low
      scope:
        read:
          - workflow-scope
        write:
          - workflow-evidence
      review_requirements:
        human_approval: false
        quorum: false
        rollback_metadata: false
      allowed_executor_profiles:
        - read_only_analysis
artifacts:
  - name: post_implementation_drift_summary
    path: "/.octon/state/evidence/validation/analysis/{{date}}-post-implementation-drift.md"
    kind: file
    format: markdown
    determinism: unique
    description: Top-level post-implementation drift/churn audit summary
  - name: post_implementation_drift_bundle
    path: "/.octon/state/evidence/runs/workflows/{{date}}-post-implementation-drift-{{slug}}/"
    kind: directory
    format: mixed
    determinism: unique
    description: Workflow bundle containing post-implementation drift/churn metadata and outputs
done_gate:
  checks:
    - "`summary.md`, `commands.md`, `inventory.md`, `bundle.yml`, and `validation.md` exist"
    - "`stage-inputs/` and `stage-logs/` exist for the workflow bundle"
    - "validate-proposal-implementation-conformance.sh passes before drift/churn is accepted"
    - "validate-proposal-post-implementation-drift.sh passes for the target proposal"
    - "`support/post-implementation-drift-churn-review.md` records `verdict: pass` and `unresolved_items_count: 0` for implemented closeout"
    - "active proposal backreferences, stale naming conflicts, generated projection freshness, manifest/schema validity, repo-local projection boundaries, target-family boundaries, and churn are explicitly reviewed"
    - "final drift/churn verdict is explicit"
constraints:
  fail_closed: true
  forbid_design_packages: false
  require_relative_local_assets: true
