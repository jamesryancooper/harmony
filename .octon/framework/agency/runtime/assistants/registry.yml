# Assistants Registry
# Maps @mention aliases to assistant definitions

schema_version: "1.0"
default: null  # No default assistant for root harness

assistants:
  - id: reviewer
    name: reviewer
    path: reviewer/
    aliases: ["@reviewer", "@review", "@rev"]
    description: "Code review specialist for quality, style, and correctness."
    delegation_value: "separation-of-duties and focused review context"
    escalates_to: orchestrator
    allowed_skills: []

  - id: refactor
    name: refactor
    path: refactor/
    aliases: ["@refactor", "@ref"]
    description: "Refactoring specialist for code improvements."
    delegation_value: "context isolation for bounded code restructuring"
    escalates_to: orchestrator
    allowed_skills: []

  - id: docs
    name: docs
    path: docs/
    aliases: ["@docs", "@doc"]
    description: "Documentation specialist for clarity and completeness."
    delegation_value: "focused documentation work that can run in parallel with implementation"
    escalates_to: orchestrator
    allowed_skills: []
