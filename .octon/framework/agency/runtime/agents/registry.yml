# Agents Registry
# Canonical index for agent definitions and delegation policy.

schema_version: "1.0"
default: orchestrator

agents:
  - id: orchestrator
    name: orchestrator
    path: orchestrator/
    contract: AGENT.md
    role_class: "orchestrator"
    default_execution_role: true
    boundary_value: "single accountable owner for planning, execution discipline, delegation, and final integration"
    role: "Default accountable execution role for governed repo-local work"
    capabilities:
      - bounded-planning
      - execution-orchestration
      - risk-tiering
      - final-integration
      - assistant-delegation
      - execution-profile-governance
    delegates_to:
      assistants: [reviewer, refactor, docs]
    allowed_skills: []
    allowed_workflows: []

  - id: verifier
    name: verifier
    path: verifier/
    contract: AGENT.md
    role_class: "verifier"
    default_execution_role: false
    boundary_value: "independent verification when separation of duties or materially separate judgment is required"
    activation_criteria:
      - "separation-of-duties"
      - "independent-verification"
      - "parallel-review"
    role: "Optional independent verification role for high-risk or concurrency-backed review"
    capabilities:
      - independent-verification
      - material-risk-detection
      - contradiction-analysis
    delegates_to:
      assistants: [reviewer, docs]
    allowed_skills: []
    allowed_workflows: []
