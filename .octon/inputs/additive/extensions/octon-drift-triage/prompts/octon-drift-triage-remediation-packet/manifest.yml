schema_version: "octon-extension-prompt-set-v1"
prompt_set_id: "octon-drift-triage-remediation-packet"
version: "1.0.0"
stages:
  - stage_id: "normalize-inputs"
    prompt_id: "octon-drift-triage-remediation-packet-normalize-inputs"
    path: "stages/01-normalize-inputs.md"
    role_class: "stage"
    order: 1
  - stage_id: "select-checks"
    prompt_id: "octon-drift-triage-remediation-packet-select-checks"
    path: "stages/02-select-checks.md"
    role_class: "stage"
    order: 2
  - stage_id: "run-and-distill"
    prompt_id: "octon-drift-triage-remediation-packet-run-and-distill"
    path: "stages/03-run-and-distill.md"
    role_class: "stage"
    order: 3
  - stage_id: "build-packet"
    prompt_id: "octon-drift-triage-remediation-packet-build-packet"
    path: "stages/04-build-packet.md"
    role_class: "stage"
    order: 4
companions:
  - prompt_id: "octon-drift-triage-remediation-packet-align-bundle"
    path: "companions/01-align-bundle.md"
    role_class: "maintenance-companion"
references:
  - ref_id: "bundle-contract"
    path: "references/bundle-contract.md"
shared_references:
  - ref_id: "repository-grounding"
    path: "shared/repository-grounding.md"
  - ref_id: "alignment-mode-contract"
    path: "shared/alignment-mode-contract.md"
  - ref_id: "packet-contract"
    path: "shared/packet-contract.md"
required_repo_anchors:
  - "README.md"
  - ".octon/README.md"
  - ".octon/instance/ingress/AGENTS.md"
  - ".octon/framework/constitution/CHARTER.md"
  - ".octon/framework/constitution/charter.yml"
  - ".octon/framework/constitution/precedence/normative.yml"
  - ".octon/framework/constitution/precedence/epistemic.yml"
  - ".octon/framework/constitution/obligations/fail-closed.yml"
  - ".octon/framework/constitution/obligations/evidence.yml"
  - ".octon/framework/constitution/ownership/roles.yml"
  - ".octon/framework/constitution/contracts/registry.yml"
  - ".octon/instance/charter/workspace.md"
  - ".octon/instance/charter/workspace.yml"
  - ".octon/framework/engine/governance/extensions/README.md"
  - ".octon/framework/engine/governance/extensions/boundary-contract.md"
  - ".octon/framework/engine/governance/extensions/trust-and-compatibility.md"
  - ".octon/framework/assurance/runtime/contracts/alignment-profiles.yml"
  - ".octon/instance/governance/policies/repo-hygiene.yml"
  - ".octon/instance/governance/contracts/drift-review.yml"
  - ".octon/instance/governance/contracts/retirement-review.yml"
  - ".github/workflows/repo-hygiene.yml"
alignment_policy:
  default_mode: "auto"
  stale_behavior: "realign_or_fail_closed"
  skip_mode_policy: "degraded-retained-explicit"
  receipt_root: ".octon/state/evidence/validation/extensions/prompt-alignment"
invalidation_conditions:
  - "prompt-manifest-sha-changed"
  - "prompt-asset-sha-changed"
  - "required-anchor-sha-changed"
  - "extension-desired-config-sha-changed"
  - "root-manifest-sha-changed"
artifact_policy:
  internal_artifacts:
    - "normalized-inputs"
    - "selected-checks"
    - "check-results"
    - "ranked-remediation"
    - "packet-path"
    - "maintainer-remediation-prompt"
  packet_support_files:
    - "reports/changed-paths.md"
    - "reports/check-selection.md"
    - "reports/check-results.md"
    - "reports/ranked-remediation.md"
    - "plans/remediation-plan.md"
    - "prompts/maintainer-remediation-prompt.md"
