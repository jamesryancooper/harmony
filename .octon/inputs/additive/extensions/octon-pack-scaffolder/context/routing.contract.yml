schema_version: "octon-extension-routing-contract-v1"
dispatchers:
  - dispatcher_id: "octon-pack-scaffolder"
    default_route_id: "create-pack"
    accepted_inputs:
      - "target"
      - "pack_id"
      - "display_name"
      - "summary"
      - "version"
      - "origin_class"
      - "bundle_id"
      - "stage_id"
      - "skill_id"
      - "command_id"
      - "argument_hint"
      - "doc_id"
      - "title"
      - "fixture_id"
      - "target_kind"
    disambiguators:
      - input_name: "target"
        kind: "enum"
        allowed_values:
          - "pack"
          - "prompt-bundle"
          - "skill"
          - "command"
          - "context-doc"
          - "validation-fixture"
    precedence:
      - "target-pack"
      - "target-prompt-bundle"
      - "target-skill"
      - "target-command"
      - "target-context-doc"
      - "target-validation-fixture"
      - "invalid-target"
      - "missing-target"
    routes:
      - route_id: "create-pack"
        status: "resolved"
        execution_binding_id: "create-pack"
        matchers:
          - matcher_id: "target-pack"
            reason_codes:
              - "explicit-target"
            all_of:
              - input_name: "target"
                predicate: "equals"
                value: "pack"
      - route_id: "create-prompt-bundle"
        status: "resolved"
        execution_binding_id: "create-prompt-bundle"
        matchers:
          - matcher_id: "target-prompt-bundle"
            reason_codes:
              - "explicit-target"
            all_of:
              - input_name: "target"
                predicate: "equals"
                value: "prompt-bundle"
      - route_id: "create-skill"
        status: "resolved"
        execution_binding_id: "create-skill"
        matchers:
          - matcher_id: "target-skill"
            reason_codes:
              - "explicit-target"
            all_of:
              - input_name: "target"
                predicate: "equals"
                value: "skill"
      - route_id: "create-command"
        status: "resolved"
        execution_binding_id: "create-command"
        matchers:
          - matcher_id: "target-command"
            reason_codes:
              - "explicit-target"
            all_of:
              - input_name: "target"
                predicate: "equals"
                value: "command"
      - route_id: "create-context-doc"
        status: "resolved"
        execution_binding_id: "create-context-doc"
        matchers:
          - matcher_id: "target-context-doc"
            reason_codes:
              - "explicit-target"
            all_of:
              - input_name: "target"
                predicate: "equals"
                value: "context-doc"
      - route_id: "create-validation-fixture"
        status: "resolved"
        execution_binding_id: "create-validation-fixture"
        matchers:
          - matcher_id: "target-validation-fixture"
            reason_codes:
              - "explicit-target"
            all_of:
              - input_name: "target"
                predicate: "equals"
                value: "validation-fixture"
      - route_id: "invalid-target"
        status: "blocked"
        matchers:
          - matcher_id: "invalid-target"
            reason_codes:
              - "unsupported-target"
            all_of:
              - input_name: "target"
                predicate: "present"
              - input_name: "target"
                predicate: "not_one_of"
                values:
                  - "pack"
                  - "prompt-bundle"
                  - "skill"
                  - "command"
                  - "context-doc"
                  - "validation-fixture"
      - route_id: "missing-target"
        status: "blocked"
        matchers:
          - matcher_id: "missing-target"
            reason_codes:
              - "missing-target"
            all_of:
              - input_name: "target"
                predicate: "absent"
    execution_bindings:
      - binding_id: "create-pack"
        route_id: "create-pack"
        command_capability_id: "octon-pack-scaffolder-create-pack"
        skill_capability_id: "octon-pack-scaffolder-create-pack"
      - binding_id: "create-prompt-bundle"
        route_id: "create-prompt-bundle"
        command_capability_id: "octon-pack-scaffolder-create-prompt-bundle"
        skill_capability_id: "octon-pack-scaffolder-create-prompt-bundle"
      - binding_id: "create-skill"
        route_id: "create-skill"
        command_capability_id: "octon-pack-scaffolder-create-skill"
        skill_capability_id: "octon-pack-scaffolder-create-skill"
      - binding_id: "create-command"
        route_id: "create-command"
        command_capability_id: "octon-pack-scaffolder-create-command"
        skill_capability_id: "octon-pack-scaffolder-create-command"
      - binding_id: "create-context-doc"
        route_id: "create-context-doc"
        command_capability_id: "octon-pack-scaffolder-create-context-doc"
        skill_capability_id: "octon-pack-scaffolder-create-context-doc"
      - binding_id: "create-validation-fixture"
        route_id: "create-validation-fixture"
        command_capability_id: "octon-pack-scaffolder-create-validation-fixture"
        skill_capability_id: "octon-pack-scaffolder-create-validation-fixture"
