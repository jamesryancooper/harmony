schema_version: "octon-extension-prompt-set-v1"
prompt_set_id: "octon-concept-integration-pipeline"
version: "1.0.0"
stages:
  - stage_id: "extraction"
    prompt_id: "octon-implementable-concept-extraction"
    path: "octon-implementable-concept-extraction.md"
    role_class: "stage"
    order: 1
  - stage_id: "verification"
    prompt_id: "octon-extracted-concepts-verification"
    path: "octon-extracted-concepts-verification.md"
    role_class: "stage"
    order: 2
  - stage_id: "packetization"
    prompt_id: "selected-concepts-integration-and-proposal-packet"
    path: "selected-concepts-integration-and-proposal-packet.md"
    role_class: "stage"
    order: 3
  - stage_id: "implementation-closeout"
    prompt_id: "proposal-packet-implementation-and-closeout"
    path: "proposal-packet-implementation-and-closeout.md"
    role_class: "stage"
    order: 4
companions:
  - prompt_id: "prompt-set-current-state-alignment-and-conflict-audit"
    path: "prompt-set-current-state-alignment-and-conflict-audit.md"
    role_class: "maintenance-companion"
  - prompt_id: "proposal-packet-executable-implementation-prompt-generator"
    path: "proposal-packet-executable-implementation-prompt-generator.md"
    role_class: "prompt-generation-companion"
required_repo_anchors:
  - "README.md"
  - ".octon/README.md"
  - ".octon/instance/ingress/AGENTS.md"
  - ".octon/framework/constitution/CHARTER.md"
  - ".octon/framework/constitution/charter.yml"
  - ".octon/framework/constitution/precedence/normative.yml"
  - ".octon/framework/constitution/precedence/epistemic.yml"
  - ".octon/framework/constitution/obligations/fail-closed.yml"
  - ".octon/framework/constitution/obligations/evidence.yml"
  - ".octon/framework/constitution/ownership/roles.yml"
  - ".octon/framework/constitution/contracts/registry.yml"
  - ".octon/instance/charter/workspace.md"
  - ".octon/instance/charter/workspace.yml"
  - ".octon/framework/cognition/_meta/architecture/specification.md"
alignment_policy:
  default_mode: "auto"
  stale_behavior: "realign_or_fail_closed"
  skip_mode_policy: "degraded-retained-explicit"
  receipt_root: ".octon/state/evidence/validation/extensions/prompt-alignment"
invalidation_conditions:
  - "prompt-manifest-sha-changed"
  - "prompt-asset-sha-changed"
  - "required-anchor-sha-changed"
  - "extension-desired-config-sha-changed"
  - "root-manifest-sha-changed"
artifact_policy:
  internal_artifacts:
    - "source-artifact"
    - "concept-extraction-output"
    - "concept-verification-output"
    - "selected-concepts"
    - "proposal-packet-path"
    - "executable-implementation-prompt"
  packet_support_files:
    - "support/source-artifact.md"
    - "support/concept-extraction-output.md"
    - "support/concept-verification-output.md"
    - "support/executable-implementation-prompt.md"
