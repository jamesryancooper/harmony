schema_version: "failure-distillation-workflow-v1"
bundle_schema_ref: ".octon/framework/constitution/contracts/assurance/distillation-bundle-v1.schema.json"
failure_class_schema_ref: ".octon/framework/constitution/contracts/assurance/failure-classification-v1.schema.json"
hardening_recommendation_schema_ref: ".octon/framework/constitution/contracts/assurance/hardening-recommendation-v1.schema.json"
source_roots:
  - ".octon/state/evidence/runs/**"
  - ".octon/state/evidence/validation/analysis/**"
disagreement_support:
  evaluator_review_root: ".octon/state/evidence/runs/**/assurance/evaluator.yml"
  review_findings_root: ".octon/state/evidence/runs/**/assurance/review-findings.ndjson"
  review_dispositions_root: ".octon/state/control/execution/runs/**/authority/review-dispositions.yml"
  required_bundle_fields:
    - "disagreement_cases"
    - "calibration_candidates"
thresholds:
  min_signal_count: 2
  recurrence_window: "P14D"
promotion_mode: "proposal_gated"
auto_promote: false
outputs:
  bundle_root: ".octon/state/evidence/validation/failure-distillation"
  generated_summary_root: ".octon/generated/cognition/distillation"
required_artifacts:
  - "bundle.yml"
  - "evidence.md"
  - "commands.md"
  - "validation.md"
  - "inventory.md"
