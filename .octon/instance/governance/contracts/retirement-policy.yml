schema_version: "repo-retirement-policy-v1"
policy_id: "execution-closeout-retirement"
owner: "Octon governance"
status: "active"
scope:
  - ".octon/framework/orchestration/runtime/_ops/scripts/write-decision.sh"
  - ".octon/framework/orchestration/runtime/_ops/scripts/write-run.sh"
  - ".octon/state/evidence/decisions/repo/**"
rules:
  - rule_id: "RET-001"
    statement: "Legacy helper-authored run bundles must not be presented as final acceptance evidence."
  - rule_id: "RET-002"
    statement: "Historical lineage may remain under state/evidence/decisions/**, but per-run authority is canonical only under state/evidence/control/execution/**."
  - rule_id: "RET-003"
    statement: "Transitional helper paths require an explicit owner, demotion status, and deletion review before removal."
retirement_targets:
  - target_id: "legacy-per-run-decision-lineage"
    path: ".octon/state/evidence/decisions/repo/**"
    disposition: "historical-lineage-only"
    owner_ref: "operator://octon-maintainers"
  - target_id: "helper-authored-run-projections"
    path: ".octon/framework/orchestration/runtime/_ops/scripts/{write-decision.sh,write-run.sh}"
    disposition: "projection-only-until-deleted"
    owner_ref: "operator://octon-maintainers"
