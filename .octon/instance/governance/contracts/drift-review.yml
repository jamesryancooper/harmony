schema_version: "repo-governance-review-v1"
review_id: "drift-review"
owner: "Octon governance"
status: "active"
purpose: "Detect stale or over-retained historical surfaces before they drift back into the live execution path."
triggers:
  - "Before any final target-state claim."
  - "When ingress, the constitutional contract registry, or the retirement registry changes."
  - "When a historical or compatibility-only surface is added, widened, or reclassified."
  - "When repo-hygiene emits a high-confidence historical-retained or never-delete finding."
cadence: "quarterly while the retirement registry contains any non-retired target, and immediately before claim or release closeout."
required_inputs:
  - ".octon/instance/ingress/AGENTS.md"
  - ".octon/framework/constitution/contracts/registry.yml"
  - ".octon/instance/governance/contracts/retirement-registry.yml"
  - ".octon/instance/governance/policies/repo-hygiene.yml"
  - ".octon/state/evidence/validation/publication/build-to-delete/<packet>/repo-hygiene-findings.yml"
evidence_requirements:
  - "Approved drift-review receipt under .octon/state/evidence/validation/publication/build-to-delete/<date>/drift-review.yml"
  - "Explicit list of historical or compatibility surfaces reviewed and their dispositions."
  - "A repo-hygiene findings attachment is present for closure-grade packets."
blocking_rule: "Reject when a historical or compatibility-only surface is reachable from the required execution path, lacks a retirement path, or remains unresolved after a high-confidence repo-hygiene historical-retained finding."
retirement_path: "Retire only if a stricter successor review contract supersedes drift review across the same scope."
