name: Skills Validation

on:
  push:
    paths:
      - '.harmony/skills/**'
      - '.workspace/skills/**'
  pull_request:
    paths:
      - '.harmony/skills/**'
      - '.workspace/skills/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for tiktoken)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tiktoken for accurate token validation
        run: pip install tiktoken

      - name: Validate skills
        run: |
          chmod +x .harmony/skills/scripts/validate-skills.sh
          .harmony/skills/scripts/validate-skills.sh --strict

      - name: Report validation results
        if: failure()
        run: |
          echo "::error::Skills validation failed. Run '.harmony/skills/scripts/validate-skills.sh' locally to see details."
