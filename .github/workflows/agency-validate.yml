name: Agency Validation

on:
  push:
    branches:
      - main
    paths:
      - '.harmony/agency/**'
      - '.harmony/harmony.yml'
      - '.harmony/START.md'
      - '.harmony/README.md'
      - '.harmony/scope.md'
      - '.harmony/scaffolding/runtime/templates/harmony/**'
  pull_request:
    paths:
      - '.harmony/agency/**'
      - '.harmony/harmony.yml'
      - '.harmony/START.md'
      - '.harmony/README.md'
      - '.harmony/scope.md'
      - '.harmony/scaffolding/runtime/templates/harmony/**'

permissions:
  contents: read

concurrency:
  group: agency-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agency contracts
        run: |
          chmod +x .harmony/agency/_ops/scripts/validate/validate-agency.sh
          .harmony/agency/_ops/scripts/validate/validate-agency.sh

      - name: Validate autonomy label catalog
        run: |
          chmod +x .harmony/agency/_ops/scripts/validate/validate-autonomy-labels.sh
          .harmony/agency/_ops/scripts/validate/validate-autonomy-labels.sh

      - name: Report validation failure
        if: failure()
        run: |
          echo "::error::Agency validation failed. Run '.harmony/agency/_ops/scripts/validate/validate-agency.sh' locally to inspect errors."
